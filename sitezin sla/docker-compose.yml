services:
  postgres:
    image: postgres:15-alpine
    container_name: taylorswift-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-taylorswift}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network

  backend:
    build: ./server
    container_name: taylorswift-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-local-dev-change-me}@postgres:5432/${POSTGRES_DB:-taylorswift}
      NODE_ENV: development
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ENABLE_UNSCOPED_ITEMS_API: ${ENABLE_UNSCOPED_ITEMS_API:-false}
      MAX_REQUEST_BODY_SIZE: ${MAX_REQUEST_BODY_SIZE:-10mb}
      MAX_SNAPSHOT_BYTES: ${MAX_SNAPSHOT_BYTES:-2097152}
      MAX_STATE_VERSIONS_PER_SCOPE: ${MAX_STATE_VERSIONS_PER_SCOPE:-50}
      WRITE_RATE_LIMIT_WINDOW_MS: ${WRITE_RATE_LIMIT_WINDOW_MS:-60000}
      WRITE_RATE_LIMIT_MAX: ${WRITE_RATE_LIMIT_MAX:-30}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  app-network:
