version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taylorswift-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: taylorswift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
        - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backend:
    build: ./server
    container_name: taylorswift-api
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/taylorswift
      JWT_SECRET: seu_jwt_secret_aqui_mudar_em_producao
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  app-network:
